<div class="container">
  <!-- Payment List and Form -->
  <div class="row">
    <div class="col-md-8 mb-4">
      <!-- Payment List Table -->
      <div class="d-flex justify-content-between align-items-center p-4 bg-light rounded shadow-sm mb-3">
        <h5 class="mb-0">Liste des paiements</h5>
        <div class="search-container">
          <input type="text" class="form-control" placeholder="Rechercher...">
        </div>
      </div>
      <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
        <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
          <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <tr>
            <th scope="col" class="px-6 py-3">
              N°
            </th>
            <th scope="col" class="px-6 py-3">
              Nom complet
            </th>
            <th scope="col" class="px-6 py-3">
              Classe
            </th>
            <th scope="col" class="px-6 py-3">
              Mois
            </th>
            <th scope="col" class="px-6 py-3">
              Statut
            </th>
            <th scope="col" class="px-6 py-3">
              Montant
            </th>
            <th scope="col" class="px-6 py-3">
              Date
            </th>

          </tr>
          </thead>
          <tbody>
          <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600">

            <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
              1
            </th>
            <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
              Mohamed Coulibaly
            </th>
            <td class="px-6 py-4">
              12 eme
            </td>
            <td class="px-6 py-4">
              October
            </td>
            <td class="px-6 py-4">
              Normal
            </td>
            <td class="px-6 py-4">
              15 000 FCFA
            </td>
            <td class="px-6 py-4">
              01 october 2024
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Payment Form -->
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Nouveau paiement</h5>
          <form>
            <div class="mb-3">
              <label for="nomEtudiant" class="form-label">Nom de l'étudiant</label>
              <input type="text" class="form-control" id="nomEtudiant" placeholder="Nom complet">
            </div>
            <div class="mb-3">
              <label for="etablissement" class="form-label">Établissement</label>
              <input type="text" class="form-control" id="etablissement" placeholder="Nom de l'établissement">
            </div>
            <div class="mb-3">
              <label for="classe" class="form-label">Classe</label>
              <input type="text" class="form-control" id="classe" placeholder="Classe">
            </div>
            <div class="mb-3">
              <label for="montant" class="form-label">Montant</label>
              <input type="text" class="form-control" id="montant" placeholder="Montant à payer">
            </div>
            <div class="mb-3">
              <label for="datePaiement" class="form-label">Date de paiement</label>
              <input type="date" class="form-control" id="datePaiement">
            </div>
            <button type="submit" class="btn btn-success w-100">Appliquer</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
