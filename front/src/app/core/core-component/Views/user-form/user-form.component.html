<div class="container">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="needs-validation" novalidate>
      <div class="row">
        <div class="col-md-6 mb-3">
            <label for="prenom">Prénom</label>
            <input type="text" class="form-control" id="prenom" formControlName="prenom" placeholder="Enter prénom" required>
            <div *ngIf="userForm.get('prenom')?.invalid && userForm.get('prenom')?.touched" class="text-danger">
              Prénom is required
            </div>
          </div>
        <div class="col-md-6 mb-3">
          <label for="nom">Nom</label>
          <input type="text" class="form-control" id="nom" formControlName="nom" placeholder="Enter nom" required>
          <div *ngIf="userForm.get('nom')?.invalid && userForm.get('nom')?.touched" class="text-danger">
            Nom is required
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" formControlName="email" placeholder="Enter email" required>
            <div *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched" class="text-danger">
              Valid email is required
            </div>
          </div>
        <div class="col-md-6 mb-3">
          <label for="tel">Téléphone</label>
          <input type="text" class="form-control" id="tel" formControlName="tel" placeholder="Enter téléphone" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="password">Mot de passe</label>
          <input type="password" class="form-control" id="password" formControlName="password" placeholder="Enter password" required>
        </div>
        <div class="col-md-6 mb-3">
        <label for="role" class="form-label">Role</label>
                <select class="form-select" id="role" formControlName="role">
                  <option value="ROLE_ADMIN">ADMINISTRATEUR</option>
                  <option value="ROLE_USER">ECONOMISTE</option>
                </select>
            </div>
      </div>
      @if (!loading) {
        <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">Submit</button>
      }@else {
        <i class="bi bi-hourglass-split spinner-border spinner-border-sm"></i> Loading...
      }
    </form>
  </div>
